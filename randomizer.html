<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codenames Randomizer</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .nav-link {
            margin-bottom: 20px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        /* The Grid Container */
        .container {
            display: grid;
            /* 5 equal columns that shrink to fit mobile */
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px;
            width: 100%;
            max-width: 600px; /* Limits size on desktop */
        }

        /* The Individual Cards */
        .card {
            aspect-ratio: 3 / 2; /* Keeps them as nice rectangles */
            outline: 2px solid black;
            border-radius: 4px;
            transition: transform 0.1s;
        }

        /* Colors */
        .blue { background-color: #2196F3; }
        .red { background-color: #f44336; }
        .yellow { background-color: #FFEB3B; }
        .black { background-color: #222; }

        button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.95);
        }


    </style>
</head>
<body>

    <a href="index.html" class="nav-link">← Back to Inputs</a>
    
    <div id="board" class="container"></div>

    <button onclick="generateColors()">Shuffle New Board</button>
<script>
 const board = document.getElementById('board');

function renderBoard(colors) {
    board.innerHTML = ''; // Clear the current view
    colors.forEach(color => {
        const div = document.createElement('div');
        div.className = `card ${color}`;
        
        // Keep the click-to-dim logic
        div.onclick = function() {
            this.style.opacity = this.style.opacity === "0.3" ? "1" : "0.3";
        };
        board.appendChild(div);
    });
}

function generateColors() {
    // 1. Create the colors
    let colors = [
        ...Array(9).fill('blue'),
        ...Array(8).fill('red'),
        ...Array(7).fill('yellow'),
        'black'
    ];

    // 2. Shuffle (Fisher-Yates)
    for (let i = colors.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [colors[i], colors[j]] = [colors[j], colors[i]];
    }

    // 3. Save to LocalStorage (The "Sticky Note")
    localStorage.setItem('codenames_board', JSON.stringify(colors));

    // 4. Show it on screen
    renderBoard(colors);
}

// --- INITIAL LOAD LOGIC ---
const savedBoard = localStorage.getItem('codenames_board');

if (savedBoard) {
    // If we have a saved board, use it!
    renderBoard(JSON.parse(savedBoard));
} else {
    // Otherwise, generate one for the first time
    generateColors();
}
</script>
</body>
</html>
