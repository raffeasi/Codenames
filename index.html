
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codenames - Input Board</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* The Grid Container */
        .container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px;
            width: 100%;
            max-width: 600px;
        }

        .item {
            aspect-ratio: 3 / 2;
            outline: 2px solid black;
            background: white;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .item input {
            width: 90%;
            height: 80%;
            border: none;
            outline: none;
            text-align: center;
            font-size: clamp(10px, 3vw, 16px);
            text-transform: uppercase;
            font-weight: bold;
            background: transparent;
        }

        /* The Secret Menu (Hidden by default) */
.color-menu {
    display: none;
    position: fixed; /* Changed from absolute to fixed */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border: 3px solid #333;
    z-index: 9999; /* Higher number to stay on top of everything */
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    gap: 10px;
}

        /* Show menu when the box has the 'active' class */
        .item.active .color-menu {
            display: flex;
            gap: 5px;
        }

        p {
            margin: 5px;
        }

/* Ensure the buttons are big enough for thumbs */
.btn {
    width: 45px;
    height: 45px;
    border-radius: 8px;
    cursor: pointer;
}

        .btn-red { background: #f44336; }
        .btn-blue { background: #2196F3; }
        .btn-yellow { background: #FFEB3B; }
        .btn-black { background: #222; }
        .btn-reset { background: #fff; line-height: 25px; text-align: center; font-size: 12px; }

.clear-btn {
    margin: 20px;
    background-color: #ff4d4d;
    color: white;
    font-weight: bold;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
}

.clear-btn:hover {
    background-color: #cc0000;
}
/* This ONLY affects buttons inside the color menu */
.color-menu .btn {
    width: 45px;
    height: 45px;
    border-radius: 8px;
    border: 2px solid #333;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Specific colors inside the menu */
.color-menu .btn-red { background-color: #f44336 !important; }
.color-menu .btn-blue { background-color: #2196F3 !important; }
.color-menu .btn-yellow { background-color: #FFEB3B !important; }
.color-menu .btn-black { background-color: #222 !important; }

/* The X Button specifically */
.color-menu .btn-reset { 
    background-color: #ffffff !important; 
    font-size: 24px; /* Big X */
    font-weight: bold;
    color: #333;
}

a {
    color: #222;
    font-weight: 1000;
    text-decoration: none;
}

    </style>
</head>
<body>

    <h1>Codenames Board</h1>
    <a href="./randomizer.html" style="text-align: center;">Go to Color Randomizer →</a>
    <div style="margin: 10px;">
    <button id="modeToggle" onclick="toggleMode()" style="padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; background-color: #2196F3; color: white; border: none;">
        Mode: Edit Text
    </button>
</div>
    
    <div class="container" id="board">
        </div>

    <script>
        const board = document.getElementById('board');

// Load the full data object (or 25 empty ones if it's the first time)
const savedData = JSON.parse(localStorage.getItem('codenames_data')) || Array(25).fill({word: '', color: 'white', textColor: 'black'});

// 1. Function to save all current words to LocalStorage
function saveWords() {
    const items = document.querySelectorAll('.item');
    const dataArray = Array.from(items).map(item => {
        const input = item.querySelector('input');
        return {
            word: input.value,
            color: item.style.backgroundColor || 'white', // Grabs current color
            textColor: input.style.color || 'black'
        };
    });
    localStorage.setItem('codenames_data', JSON.stringify(dataArray));
}

// 2. Load words from memory
const savedWords = JSON.parse(localStorage.getItem('codenames_words')) || Array(25).fill('');

for (let i = 0; i < 25; i++) {
    const item = document.createElement('div');
    item.className = 'item';
    
    // LOAD: Set the box color from memory
    item.style.backgroundColor = savedData[i].color || 'white';
    
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'WORD';
    
    // LOAD: Set the word and text color from memory
    input.value = savedData[i].word || '';
    input.style.color = savedData[i].textColor || 'black';

    // SAVE: When typing
    input.oninput = () => saveWords(); 
    input.onclick = (e) => e.stopPropagation();

    // COLOR MENU LOGIC
    const menu = document.createElement('div');
    menu.className = 'color-menu';

    const colors = [
        { name: 'red', hex: '#f44336' },
        { name: 'blue', hex: '#2196F3' },
        { name: 'yellow', hex: '#FFEB3B' },
        { name: 'black', hex: '#222' },
        { name: 'reset', hex: '#fff' }
    ];

    colors.forEach(c => {
        const btn = document.createElement('div');
        btn.className = `btn btn-${c.name}`;
        if(c.name === 'reset') btn.innerText = 'X';
        
        btn.onclick = (e) => {
            e.stopPropagation();
            item.style.backgroundColor = c.hex;
            input.style.color = (c.name === 'black') ? 'white' : 'black';
            item.classList.remove('active');
            
            // SAVE: Immediately after picking a color
            saveWords(); 
        };
        menu.appendChild(btn);
    });

item.onclick = () => {
    if (isColorMode) {
        // 1. Close any menus that are already open
        document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
        
        // 2. Open the menu for the box we just clicked
        item.classList.add('active');
    }
}; // This closes the item.onclick function

    item.appendChild(input);
    item.appendChild(menu);
    board.appendChild(item);
}

function clearBoard() {
    if (confirm("Are you sure you want to erase all words and colors?")) {
        const items = document.querySelectorAll('.item');
        
        items.forEach(item => {
            const input = item.querySelector('input');
            
            // 1. Reset the text
            input.value = "";
            input.style.color = "black";
            
            // 2. Reset the background
            item.style.backgroundColor = "white";
        });

        // 3. CRITICAL: Save this 'Blank' state to memory immediately
        saveWords(); 
        
        alert("Board Reset!");
    }
}

let isColorMode = false;

function toggleMode() {
    isColorMode = !isColorMode;
    const btn = document.getElementById('modeToggle');
    const inputs = document.querySelectorAll('.item input');

    if (isColorMode) {
        btn.innerText = "Mode: Change Colors";
        btn.style.backgroundColor = "#4CAF50"; // Green for color mode
        // Disable inputs so they don't block the box click
        inputs.forEach(input => input.style.pointerEvents = 'none');
    } else {
        btn.innerText = "Mode: Edit Text";
        btn.style.backgroundColor = "#2196F3"; // Blue for text mode
        // Re-enable inputs
        inputs.forEach(input => input.style.pointerEvents = 'auto');
        // Close any open menus
        document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
    }
}
    </script>
        <button onclick="clearBoard()" class="clear-btn">Clear All Words</button>
</body>
</html>
