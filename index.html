
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codenames - Input Board</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* The Grid Container */
        .container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px;
            width: 100%;
            max-width: 600px;
        }

        .item {
            aspect-ratio: 3 / 2;
            outline: 2px solid black;
            background: white;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .item input {
            width: 90%;
            height: 80%;
            border: none;
            outline: none;
            text-align: center;
            font-size: clamp(10px, 3vw, 16px);
            text-transform: uppercase;
            font-weight: bold;
            background: transparent;
        }

        /* The Secret Menu (Hidden by default) */
        .color-menu {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 2px solid #333;
            z-index: 10;
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Show menu when the box has the 'active' class */
        .item.active .color-menu {
            display: flex;
            gap: 5px;
        }

        p {
            margin: 5px;
        }

        .btn {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            border: 1px solid #000;
            cursor: pointer;
        }

        .btn-red { background: #f44336; }
        .btn-blue { background: #2196F3; }
        .btn-yellow { background: #FFEB3B; }
        .btn-black { background: #222; }
        .btn-reset { background: #fff; line-height: 25px; text-align: center; font-size: 12px; }

.clear-btn {
    margin: 10px;
    background-color: #ff4d4d;
    color: white;
    font-weight: bold;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
}

.clear-btn:hover {
    background-color: #cc0000;
}

p,a {
    color: #222;
    font-weight: 1000;
    text-decoration: none;
}

    </style>
</head>
<body>

    <h1>Codenames Board</h1>
    <a href="./randomizer.html" style="text-align: center;">Go to Color Randomizer →</a>
    <button onclick="clearBoard()" class="clear-btn">Clear All Words</button>
    <p>Click a box to set its color.</p>
    
    <div class="container" id="board">
        </div>

    <script>
        const board = document.getElementById('board');

// 1. Function to save all current words to LocalStorage
function saveWords() {
    const inputs = document.querySelectorAll('.item input');
    const wordsArray = Array.from(inputs).map(input => input.value);
    localStorage.setItem('codenames_words', JSON.stringify(wordsArray));
}

// 2. Load words from memory
const savedWords = JSON.parse(localStorage.getItem('codenames_words')) || Array(25).fill('');

for (let i = 0; i < 25; i++) {
    const item = document.createElement('div');
    item.className = 'item';
    
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'WORD';
    input.value = savedWords[i]; // Put the saved word back in the box

    // SAVE every time someone stops typing
    input.oninput = () => saveWords(); 
    
    input.onclick = (e) => e.stopPropagation();

    // ... (Keep the rest of your color menu code here) ...
    // Make sure to add the color menu logic back inside this loop!
    
    item.appendChild(input);
    board.appendChild(item);
    // 1. Create the Menu Container
    const menu = document.createElement('div');
    menu.className = 'color-menu';

    // 2. Define the buttons
    const colors = [
        { name: 'red', hex: '#f44336' },
        { name: 'blue', hex: '#2196F3' },
        { name: 'yellow', hex: '#FFEB3B' },
        { name: 'black', hex: '#222' },
        { name: 'reset', hex: '#fff' }
    ];

    // 3. Build the buttons
    colors.forEach(c => {
        const btn = document.createElement('div');
        btn.className = `btn btn-${c.name}`;
        if(c.name === 'reset') btn.innerText = 'X';
        
        btn.onclick = (e) => {
            e.stopPropagation();
            item.style.backgroundColor = c.hex;
            input.style.color = (c.name === 'black') ? 'white' : 'black';
            item.classList.remove('active');
        };
        menu.appendChild(btn);
    });

    // 4. Logic to open the menu
    item.onclick = () => {
        document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
    };

    item.appendChild(menu);
}

function clearBoard() {
    if (confirm("Are you sure you want to erase all words?")) {
        // 1. Find all the editable word boxes
        const displays = document.querySelectorAll('.item input');
        
        // 2. Loop through them and make them empty
        displays.forEach(input => {
            input.value = "";
        });

        // 3. Update the memory so they stay empty on refresh
        saveWords();
        
        // Optional: Reset all colors back to white too
        document.querySelectorAll('.item').forEach(item => {
            item.style.backgroundColor = "white";
        });
    }
}
    </script>
</body>
</html>
